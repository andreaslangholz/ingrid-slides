<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ingrid Decks</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,300;0,400;0,500;0,700;0,800&family=Fira+Code:wght@400;500;600&display=swap');

:root{
  --ink:#000; --white:#fff;
  --violet:#AA73FA; --blue:#5FA4FA;
  --g1:#F2F2F2; --g2:#D8D8D8; --g3:#999; --g4:#3F3F3F;
  --ff:'Plus Jakarta Sans',system-ui,sans-serif;
  --ffm:'Fira Code','Courier New',monospace;
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--ff);color:var(--ink);background:var(--white);-webkit-font-smoothing:antialiased;min-height:100vh;display:flex;flex-direction:column}

/* ── Hero ── */
.hero{
  position:relative; padding:4vw 6vw 3.2vw;
  background:url('brand/ingrid/gradients/dark.png') center/cover no-repeat; color:var(--white);
}
.hero-logo img{height:clamp(22px,3.4vh,36px);width:auto;display:block}
.hero-title{
  margin-top:clamp(2.2rem,7vw,5rem);
  font-weight:500; font-size:clamp(2.6rem,7vw,5.5rem); line-height:1; letter-spacing:-.02em;
}
.hero-sub{
  margin-top:.9rem; max-width:46ch; font-weight:300;
  font-size:clamp(.9rem,1.4vw,1.1rem); line-height:1.6; color:rgba(255,255,255,.82);
}

/* ── Deck grid ── */
main{flex:1; padding:clamp(2rem,4vw,3.5rem) 6vw}
.section-label{
  font-family:var(--ffm); font-size:.62rem; font-weight:600; letter-spacing:.14em;
  text-transform:uppercase; color:var(--g3); margin-bottom:1.2rem;
}
.deck-grid{display:grid; grid-template-columns:repeat(auto-fill,minmax(290px,1fr)); gap:1.2rem}
.deck-card{
  display:flex; flex-direction:column; gap:.55rem;
  border:1px solid var(--g2); border-radius:8px; padding:1.4rem 1.5rem;
  text-decoration:none; color:inherit; background:var(--white);
  transition:border-color .15s ease, box-shadow .15s ease, transform .15s ease;
}
.deck-card:hover{border-color:var(--ink); box-shadow:0 8px 24px rgba(0,0,0,.08); transform:translateY(-2px)}
.deck-card-top{display:flex; align-items:baseline; justify-content:space-between; gap:1rem}
.deck-name{font-weight:500; font-size:1.25rem; letter-spacing:-.01em}
.deck-tag{font-family:var(--ffm); font-size:.58rem; font-weight:500; letter-spacing:.06em; text-transform:uppercase; color:var(--violet); white-space:nowrap}
.deck-desc{font-weight:300; font-size:.88rem; line-height:1.55; color:var(--g4); flex:1}
.deck-actions{display:flex; gap:.5rem; margin-top:.5rem}
.deck-actions a{
  font-family:var(--ffm); font-size:.6rem; font-weight:500; letter-spacing:.08em; text-transform:uppercase;
  text-decoration:none; padding:6px 13px; border-radius:5px; border:1px solid var(--g2); color:var(--g4);
  transition:border-color .15s ease, color .15s ease, background .15s ease;
}
.deck-actions a:hover{border-color:var(--ink); color:var(--ink)}
.deck-actions a.primary{background:var(--ink); color:var(--white); border-color:var(--ink)}
.deck-actions a.primary:hover{background:var(--violet); border-color:var(--violet)}

footer{padding:1.4rem 6vw; border-top:1px solid var(--g2)}
.foot-note{font-family:var(--ffm); font-size:.58rem; letter-spacing:.1em; text-transform:uppercase; color:var(--g3)}
</style>
</head>
<body>

<header class="hero">
  <div class="hero-logo"><img src="brand/ingrid/logos/color-on-dark.png" alt="Ingrid"></div>
  <h1 class="hero-title">decks</h1>
  <p class="hero-sub">A shared engine, many presentations. Open a deck to present, or edit it in the browser.</p>
</header>

<main>
  <div class="section-label">Start a new deck</div>
  <div class="deck-grid" id="starterGrid"></div>
  <div class="section-label" style="margin-top:2.6rem">Examples &amp; reference</div>
  <div class="deck-grid" id="deckGrid"></div>
</main>

<footer>
  <div class="foot-note">Ingrid Capacity · built on the shared deck engine</div>
</footer>

<script>
  /* Add a deck = add a line here. Each deck is a thin shell that links engine/. */

  /* Starters: copy one, fill it in. Pick-a-start templates. */
  const starters = [
    {
      file: 'starter-blank.html',
      name: 'Blank Ingrid',
      tag: 'Starter',
      desc: 'The neutral skeleton — cover, agenda, content, closing. Copy it and build your deck on top.'
    },
    {
      file: 'starter-market-update.html',
      name: 'Market update',
      tag: 'Starter',
      desc: 'A data deck — headline stats and a chart. Wire it to live Ingrid data via the MCP server.'
    },
    {
      file: 'starter-pitch.html',
      name: 'Pitch',
      tag: 'Starter',
      desc: 'The six-beat story arc — hook, world, turn, evidence, the honest part, close. Fill in the narrative.'
    },
  ];

  /* Examples & reference decks. */
  const decks = [
    {
      file: 'ingrid_examples.html',
      name: 'Examples',
      tag: 'Gallery',
      desc: 'Generic layout & component gallery — every slide type with placeholder content. Start here to pick a layout.'
    },
    {
      file: 'ingrid_library.html',
      name: 'Content Library',
      tag: 'Reusable',
      desc: 'Concrete, reusable Ingrid slides — business models and the tech-domain matrix — ready to drop into a deck.'
    },
  ];

  function renderInto(gridId, list) {
    const grid = document.getElementById(gridId);
    for (const d of list) {
      const card = document.createElement('a');
      card.className = 'deck-card';
      card.href = d.file;
      card.innerHTML =
        '<div class="deck-card-top"><span class="deck-name"></span><span class="deck-tag"></span></div>' +
        '<p class="deck-desc"></p>' +
        '<div class="deck-actions">' +
          '<a class="primary" href="' + d.file + '">Open</a>' +
          '<a href="' + d.file + '?edit">Edit</a>' +
        '</div>';
      card.querySelector('.deck-name').textContent = d.name;
      card.querySelector('.deck-tag').textContent = d.tag;
      card.querySelector('.deck-desc').textContent = d.desc;
      // let the inner buttons handle their own navigation
      card.querySelectorAll('.deck-actions a').forEach(a =>
        a.addEventListener('click', e => e.stopPropagation()));
      grid.appendChild(card);
    }
  }

  renderInto('starterGrid', starters);
  renderInto('deckGrid', decks);
</script>

</body>
</html>
